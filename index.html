<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🇲🇳 신나는 몽골어 번역기</title>

<style>
body {
    font-family: Arial;
    background: #f5f7fb;
    text-align: center;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

.container {
    max-width: 520px;
    margin: auto;
}

/* 입력 */
input {
    width: 70%;
    padding: 12px;
    font-size: 16px;
}

/* 버튼 */
button {
    padding: 12px;
    background: #2d8cff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* 결과 */
.result {
    margin-top: 20px;
    font-size: 20px;
}

.roman {
    color: green;
    margin-top: 8px;
}

.korean {
    color: gray;
    margin-top: 5px;
}

/* 기록 */
.history {
    margin-top: 30px;
    text-align: left;
}

.item {
    background: white;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
}

.copy-btn {
    background: #ddd;
    border: none;
    padding: 5px;
    cursor: pointer;
}

/* 🔥 진행사항-1: 가로모드 */
@media (orientation: landscape) {

    body {
        padding: 10px;
    }

    .container {
        transform: rotate(90deg);
        transform-origin: center;
        width: 100vh;
    }

    .result {
        font-size: 32px;
    }

    input, button {
        font-size: 20px;
    }
}
</style>
</head>

<body>

<h1>🇲🇳 신나는 몽골어 번역기</h1>

<div class="container">

<input type="text" id="input" placeholder="한국어 입력">
<button onclick="run()">변환</button>

<div class="result" id="result"></div>
<div class="history" id="history"></div>

</div>

<script>

/* 로마자 */
function toRoman(text){
    return text
    .replace(/а/g,"a").replace(/б/g,"b").replace(/в/g,"v")
    .replace(/г/g,"g").replace(/д/g,"d").replace(/е/g,"e")
    .replace(/ё/g,"yo").replace(/ж/g,"j").replace(/з/g,"z")
    .replace(/и/g,"i").replace(/й/g,"i").replace(/к/g,"k")
    .replace(/л/g,"l").replace(/м/g,"m").replace(/н/g,"n")
    .replace(/о/g,"o").replace(/ө/g,"ö").replace(/п/g,"p")
    .replace(/р/g,"r").replace(/с/g,"s").replace(/т/g,"t")
    .replace(/у/g,"u").replace(/ү/g,"ü").replace(/х/g,"kh")
    .replace(/ц/g,"ts").replace(/ч/g,"ch").replace(/ш/g,"sh");
}

/* 한글독 */
function romanToKorean(text){
    return text
    .replace(/sh/g,"쉬").replace(/ch/g,"치").replace(/kh/g,"흐")
    .replace(/ts/g,"츠")
    .replace(/a/g,"아").replace(/e/g,"에").replace(/i/g,"이")
    .replace(/o/g,"오").replace(/u/g,"우").replace(/ö/g,"어")
    .replace(/ü/g,"위")
    .replace(/b/g,"ㅂ").replace(/v/g,"ㅂ").replace(/g/g,"ㄱ")
    .replace(/d/g,"ㄷ").replace(/k/g,"ㅋ").replace(/l/g,"ㄹ")
    .replace(/m/g,"ㅁ").replace(/n/g,"ㄴ").replace(/r/g,"르");
}

let historyList = [];

async function run(){
    const input = document.getElementById("input").value;

    const res = await fetch(
        "https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=mn&dt=t&q="
        + encodeURIComponent(input)
    );

    const data = await res.json();
    const mn = data[0][0][0];

    const roman = toRoman(mn);
    const kor = romanToKorean(roman);

    document.getElementById("result").innerHTML = `
        <div>${mn}</div>
        <div class="roman">${roman}</div>
        <div class="korean">${kor}</div>
    `;

    let text = `${input} / ${mn} / ${roman} / ${kor}`;

    historyList.unshift(text);
    if(historyList.length > 12) historyList.pop();

    renderHistory();
}

/* 기록 */
function renderHistory(){
    const box = document.getElementById("history");
    box.innerHTML = "";

    historyList.forEach(item=>{
        const div = document.createElement("div");
        div.className = "item";

        const span = document.createElement("span");
        span.innerText = item;

        const btn = document.createElement("button");
        btn.className = "copy-btn";
        btn.innerText = "복사";
        btn.onclick = ()=>navigator.clipboard.writeText(item);

        div.appendChild(span);
        div.appendChild(btn);
        box.appendChild(div);
    });
}

/* 🔥 진행사항-1: 엔터 */
document.getElementById("input").addEventListener("keydown", e=>{
    if(e.key === "Enter") run();
});
</script>

</body>
</html>
