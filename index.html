<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🇲🇳 신나는 몽골어 번역기</title>

<style>
body {
    font-family: Arial;
    background: #f5f7fb;
    text-align: center;
    margin: 0;
    padding: 0;
}

/* 버전 */
.version {
    position: fixed;
    top: 10px;
    right: 15px;
    color: gray;
    font-size: 12px;
}

h1 { margin: 15px 0; }

.container {
    max-width: 520px;
    margin: auto;
    padding: 10px;
}

/* 입력 */
input {
    width: 70%;
    padding: 12px;
    font-size: 16px;
}

/* 버튼 */
button {
    padding: 12px;
    background: #2d8cff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* 결과 */
.result {
    margin-top: 20px;
    font-size: 20px;
}

.mn { font-weight: bold; }
.roman { color: black; }
.korean { color: gray; }
.en { color: green; margin-top: 8px; }

/* 기록 */
.history {
    margin-top: 20px;
    text-align: left;
}

.item {
    background: white;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.buttons {
    display: flex;
    gap: 5px;
}

.copy-btn {
    background: #ddd;
    color: black;
}

.screen-btn {
    background: #444;
}

/* 🔥 스크린 모드 */
#screenMode {
    display: none;
    position: fixed;
    inset: 0;
    background: black;
    color: white;
    z-index: 999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* 스크린 텍스트 */
#screenText {
    font-size: 40px;
    text-align: center;
    transition: transform 0.3s;
}

/* 버튼 영역 */
.screen-controls {
    position: absolute;
    bottom: 20px;
    display: flex;
    gap: 10px;
}

.screen-controls button {
    background: #666;
}

/* 🔥 모바일 최적화 */
@media (max-width: 768px) {

    body {
        padding: 0;
    }

    .container {
        width: 100%;
        max-width: none;
        padding: 10px;
    }

    input {
        width: 100%;
        font-size: 18px;
    }

    button {
        width: 100%;
        margin-top: 10px;
        font-size: 18px;
    }

    .result {
        font-size: 26px;
    }

    .item {
        flex-direction: column;
        align-items: flex-start;
    }

    .buttons {
        margin-top: 8px;
    }
}
</style>
</head>

<body>

<div class="version">ver4</div>

<h1>🇲🇳 신나는 몽골어 번역기</h1>

<div class="container">

<input type="text" id="input" placeholder="한국어 입력">
<button onclick="run()">변환</button>

<div class="result" id="result"></div>
<div class="history" id="history"></div>

</div>

<!-- 🔥 스크린 모드 -->
<div id="screenMode">
    <div id="screenText"></div>

    <div class="screen-controls">
        <button onclick="setVertical()">세로</button>
        <button onclick="setHorizontal()">가로</button>
        <button onclick="closeScreen()">닫기</button>
    </div>
</div>

<script>

/* 로마자 */
function toRoman(text){
    return text
    .replace(/а/g,"a").replace(/б/g,"b").replace(/в/g,"v")
    .replace(/г/g,"g").replace(/д/g,"d").replace(/е/g,"e")
    .replace(/ё/g,"yo").replace(/ж/g,"j").replace(/з/g,"z")
    .replace(/и/g,"i").replace(/й/g,"i").replace(/к/g,"k")
    .replace(/л/g,"l").replace(/м/g,"m").replace(/н/g,"n")
    .replace(/о/g,"o").replace(/ө/g,"ö").replace(/п/g,"p")
    .replace(/р/g,"r").replace(/с/g,"s").replace(/т/g,"t")
    .replace(/у/g,"u").replace(/ү/g,"ü").replace(/х/g,"kh")
    .replace(/ц/g,"ts").replace(/ч/g,"ch").replace(/ш/g,"sh");
}

/* 한글독 */
function romanToKorean(text){
    return text
    .replace(/sh/g,"쉬").replace(/ch/g,"치").replace(/kh/g,"흐")
    .replace(/ts/g,"츠")
    .replace(/a/g,"아").replace(/e/g,"에").replace(/i/g,"이")
    .replace(/o/g,"오").replace(/u/g,"우").replace(/ö/g,"어")
    .replace(/ü/g,"위")
    .replace(/b/g,"ㅂ").replace(/v/g,"ㅂ").replace(/g/g,"ㄱ")
    .replace(/d/g,"ㄷ").replace(/k/g,"ㅋ").replace(/l/g,"ㄹ")
    .replace(/m/g,"ㅁ").replace(/n/g,"ㄴ").replace(/r/g,"르");
}

let historyList = [];

async function run(){
    const input = document.getElementById("input").value;

    // 몽골어
    const res1 = await fetch(
        "https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=mn&dt=t&q="
        + encodeURIComponent(input)
    );
    const data1 = await res1.json();
    const mn = data1[0][0][0];

    // 영어
    const res2 = await fetch(
        "https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=en&dt=t&q="
        + encodeURIComponent(input)
    );
    const data2 = await res2.json();
    const en = data2[0][0][0];

    const roman = toRoman(mn);
    const kor = romanToKorean(roman);

    document.getElementById("result").innerHTML = `
        <div class="mn">${mn}</div>
        <div class="roman">${roman}</div>
        <div class="korean">${kor}</div>
        <div class="en">${en}</div>
    `;

    let text = `${mn} / ${roman} / ${kor} / ${en}`;

    historyList.unshift(text);
    if(historyList.length > 12) historyList.pop();

    renderHistory();
}

/* 기록 */
function renderHistory(){
    const box = document.getElementById("history");
    box.innerHTML = "";

    historyList.forEach(item=>{
        const div = document.createElement("div");
        div.className = "item";

        const span = document.createElement("span");
        span.innerText = item;

        const btnBox = document.createElement("div");
        btnBox.className = "buttons";

        const copyBtn = document.createElement("button");
        copyBtn.className = "copy-btn";
        copyBtn.innerText = "복사";
        copyBtn.onclick = ()=>navigator.clipboard.writeText(item);

        const screenBtn = document.createElement("button");
        screenBtn.className = "screen-btn";
        screenBtn.innerText = "스크린";
        screenBtn.onclick = ()=>openScreen(item);

        btnBox.appendChild(copyBtn);
        btnBox.appendChild(screenBtn);

        div.appendChild(span);
        div.appendChild(btnBox);
        box.appendChild(div);
    });
}

/* 스크린 */
function openScreen(text){
    document.getElementById("screenText").innerText = text;
    document.getElementById("screenMode").style.display = "flex";
}

/* 방향 */
function setVertical(){
    document.getElementById("screenText").style.transform = "rotate(0deg)";
}

function setHorizontal(){
    document.getElementById("screenText").style.transform = "rotate(90deg)";
}

function closeScreen(){
    document.getElementById("screenMode").style.display = "none";
}

/* 엔터 */
document.getElementById("input").addEventListener("keydown", e=>{
    if(e.key === "Enter") run();
});
</script>

</body>
</html>
